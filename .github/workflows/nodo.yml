name: nodo
on: pull_request
permissions:
  contents: read
  pull-requests: write
jobs:
  map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      # In YOUR repo, replace `shivae372/nodo@v1` below. (Inside this repo you can
      # use `./` to run the action from the working tree.)
      - uses: ./
        with:
          path: '.'
          args: '--no-ast'
          comment: 'true'
